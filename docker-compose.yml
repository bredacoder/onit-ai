services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: onit
      POSTGRES_USER: onit
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onit -d onit"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
